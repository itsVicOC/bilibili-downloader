name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            label: macOS
            artifact_name: BilibiliDownloader-macOS
            archive_name: BilibiliDownloader-macOS
          - os: windows-latest
            label: Windows
            artifact_name: BilibiliDownloader-Windows
            archive_name: BilibiliDownloader-Windows

    env:
      QT_QPA_PLATFORM: offscreen

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -c constraints.txt -e ".[dev]"
          pip install -c constraints.txt cyclonedx-bom

      - name: Verify tag matches package version
        shell: bash
        run: |
          package_tag="v$(python -c 'from bilibili_downloader import __version__; print(__version__)')"
          if [ "$GITHUB_REF_NAME" != "$package_tag" ]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $package_tag" >&2
            exit 1
          fi

      - name: Run tests
        run: pytest -q

      - name: Build application
        run: pyinstaller --noconfirm --clean BilibiliDownloader.spec

      - name: Generate dependency SBOM
        run: cyclonedx-py environment --output-format JSON --output-file "${{ matrix.archive_name }}-${{ github.ref_name }}.cdx.json"

      - name: Sign and notarize macOS app
        if: runner.os == 'macOS' && env.MACOS_CERTIFICATE != ''
        shell: bash
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          MACOS_SIGNING_IDENTITY: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          cert_path="$RUNNER_TEMP/biliflow-signing.p12"
          keychain_path="$RUNNER_TEMP/biliflow-signing.keychain-db"
          notarize_zip="$RUNNER_TEMP/BilibiliDownloader-notarize.zip"
          keychain_password="$(openssl rand -hex 24)"
          cleanup() {
            security delete-keychain "$keychain_path" >/dev/null 2>&1 || true
            rm -f "$cert_path" "$notarize_zip"
          }
          trap cleanup EXIT

          printf '%s' "$MACOS_CERTIFICATE" | base64 --decode > "$cert_path"
          security create-keychain -p "$keychain_password" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$keychain_password" "$keychain_path"
          security import "$cert_path" -k "$keychain_path" -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: -s -k "$keychain_password" "$keychain_path"
          security list-keychains -d user -s "$keychain_path"

          codesign --force --deep --options runtime --timestamp \
            --sign "$MACOS_SIGNING_IDENTITY" "dist/BilibiliDownloader.app"
          codesign --verify --deep --strict --verbose=2 "dist/BilibiliDownloader.app"
          ditto -c -k --sequesterRsrc --keepParent \
            "dist/BilibiliDownloader.app" "$notarize_zip"
          xcrun notarytool submit "$notarize_zip" \
            --apple-id "$APPLE_ID" \
            --password "$APPLE_APP_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" \
            --wait
          xcrun stapler staple "dist/BilibiliDownloader.app"

      - name: Package macOS app
        if: runner.os == 'macOS'
        run: |
          if [ -d "dist/BilibiliDownloader.app" ]; then
            ditto -c -k --sequesterRsrc --keepParent "dist/BilibiliDownloader.app" "${{ matrix.archive_name }}-${{ github.ref_name }}.zip"
          else
            ditto -c -k --keepParent "dist/BilibiliDownloader" "${{ matrix.archive_name }}-${{ github.ref_name }}.zip"
          fi

      - name: Package Windows app
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/BilibiliDownloader" -DestinationPath "${{ matrix.archive_name }}-${{ github.ref_name }}.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}-${{ github.ref_name }}
          path: |
            ${{ matrix.archive_name }}-${{ github.ref_name }}.zip
            ${{ matrix.archive_name }}-${{ github.ref_name }}.cdx.json
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Prepare release notes
        shell: bash
        run: awk '/^## v/{if (found) exit; found=1} found' CHANGELOG.md > release-notes.md

      - name: Generate SHA-256 checksums
        shell: bash
        run: |
          cd release-assets
          shasum -a 256 *.zip *.cdx.json > SHA256SUMS.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Bilibili Downloader ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
